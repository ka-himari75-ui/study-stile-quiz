<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたにぴったりの勉強法診断</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #E3F2FD;
            --text-color: #333;
        }
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: var(--primary-color); text-align: center; font-size: 1.5rem; }
        .description { font-size: 0.9rem; margin-bottom: 20px; line-height: 1.6; }
        .question { margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #eee; }
        label { cursor: pointer; display: flex; align-items: center; gap: 10px; }
        input[type="checkbox"] { transform: scale(1.3); }
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; }
        #result { display: none; margin-top: 30px; padding: 20px; border: 2px solid var(--primary-color); border-radius: 15px; }
        .result-type { font-size: 1.4rem; font-weight: bold; color: var(--primary-color); text-align: center; }
        .icon { font-size: 3rem; text-align: center; display: block; margin: 10px 0; }
        .loading { text-align: center; color: #666; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 あなたにぴったりの勉強法診断</h1>
    <p class="description">自分に当てはまるものにチェックを入れてね！（中高生向け）</p>

    <div id="quiz-form">
        <div class="question"><label><input type="checkbox" class="q-type1"> 教科書の図やイラストに目が止まることが多い</label></div>
        <div class="question"><label><input type="checkbox" class="q-type1"> カラーペンやマーカーを使ってノートを取るのが好き</label></div>
        
        <div class="question"><label><input type="checkbox" class="q-type2"> 授業を聞いているだけで内容がスッと入ってくる</label></div>
        <div class="question"><label><input type="checkbox" class="q-type2"> 音読すると内容を覚えやすいと感じる</label></div>

        <div class="question"><label><input type="checkbox" class="q-type3"> 実際に手を動かしてやってみることで理解できる</label></div>
        <div class="question"><label><input type="checkbox" class="q-type3"> 体験したことや実験の内容はよく覚えている</label></div>

        <div class="question"><label><input type="checkbox" class="q-type4"> 教科書や参考書を読んで自分でまとめるのが好き</label></div>
        <div class="question"><label><input type="checkbox" class="q-type4"> 文章を箇条書きやリストに整理するのが得意</label></div>

        <div class="question"><label><input type="checkbox" class="q-type5"> 「なぜそうなるのか」理由がわかると納得できる</label></div>
        <div class="question"><label><input type="checkbox" class="q-type5"> 仕組みや原理から理解しようとする方だ</label></div>

        <button onclick="calculateResult()">診断結果を見る！</button>
        <p class="loading" id="status-msg"></p>
    </div>

    <div id="result">
        <span class="icon" id="res-icon"></span>
        <div class="result-type" id="res-title"></div>
        <p id="res-desc"></p>
        <div id="res-advice" style="background: #f0f7ff; padding: 15px; border-radius: 10px;"></div>
        <button onclick="location.reload()" style="background: #666; margin-top: 20px;">もう一度診断する</button>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyJD_3qWTeWhf3HqJ45sEqtEFuJs4RcOZ5ELCbvMyPHIsKPHDTMJl48T_y_1lGsF8vY/exec'; // 後で差し替え

    const types = {
        type1: { title: "視覚型学習者", icon: "👁️", desc: "図やグラフで理解するのが得意。カラフルなノートを作るのがおすすめ！", advice: ["マインドマップを使って情報を整理しよう", "カラーペンで重要な箇所を色分けするのが効果的", "YouTube動画や図解を積極的に活用しよう"] },
        type2: { title: "聴覚型学習者", icon: "🎧", desc: "聞いて理解するのが得意。音読や講義形式がおすすめ！", advice: ["声に出して読む「音読勉強法」が効果的", "友達に説明することで理解が深まる", "軽いBGMをかけながら勉強すると集中しやすい"] },
        type3: { title: "体験型学習者", icon: "✍️", desc: "実際に書いたり体を動かしたりすることで理解が深まるタイプ。", advice: ["何度も書いて覚える「反復書き取り」が効果的", "実験や体験型の学習に積極的に参加しよう", "ポモドーロ法（25分集中+5分休憩）で集中力UP"] },
        type4: { title: "読み書き型学習者", icon: "📖", desc: "文章を読んで整理することが得意。ノートにまとめるタイプです。", advice: ["丁寧にノートを取り、自分の言葉でまとめ直そう", "箇条書きやリストで情報を整理するのが効果的", "問題を自分で作って解く「自作問題法」がおすすめ"] },
        type5: { title: "論理型学習者", icon: "🧩", desc: "理由や仕組みから理解するのが得意。「なぜ？」を追求するタイプ。", advice: ["「なぜそうなるのか」を徹底的に調べてみよう", "原理・原則から覚えることで応用力がつく", "「解法の流れ」を考える習慣をつけよう"] }
    };

    async function calculateResult() {
        const scores = {
            type1: document.querySelectorAll('.q-type1:checked').length,
            type2: document.querySelectorAll('.q-type2:checked').length,
            type3: document.querySelectorAll('.q-type3:checked').length,
            type4: document.querySelectorAll('.q-type4:checked').length,
            type5: document.querySelectorAll('.q-type5:checked').length,
        };

        // 一番高いスコアのタイプを決定
        let winner = 'type1';
        for (let t in scores) { if (scores[t] > scores[winner]) winner = t; }

        const result = types[winner];
        
        // 結果を表示
        document.getElementById('quiz-form').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('res-icon').textContent = result.icon;
        document.getElementById('res-title').textContent = result.title;
        document.getElementById('res-desc').textContent = result.desc;
        document.getElementById('res-advice').innerHTML = "<strong>💡 おすすめ勉強法:</strong><br>・" + result.advice.join('<br>・');

        // データ送信
        sendData(winner, scores);
    }

    async function sendData(winner, scores) {
        document.getElementById('status-msg').textContent = "データを記録中...";
        
        try {
            // おおよその地域情報を取得（外部API利用）
            const geoRes = await fetch('https://ipapi.co/json/');
            const geoData = await geoRes.json();

            const payload = {
                timestamp: new Date().toLocaleString('ja-JP'),
                result: types[winner].title,
                scores: scores,
                location: `${geoData.region} ${geoData.city}`,
                device: {
                    os: navigator.platform,
                    browser: navigator.userAgent.split(' ').pop(),
                    isMobile: /Mobi|Android/i.test(navigator.userAgent) ? "スマホ" : "PC"
                }
            };

            const formData = new URLSearchParams();
            formData.append('data', JSON.stringify(payload));

            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: formData,
            });
            document.getElementById('status-msg').textContent = "記録完了！";
        } catch (e) {
            console.error(e);
            document.getElementById('status-msg').textContent = "通信エラーが発生しましたが、診断は完了しました。";
        }
    }
</script>

</body>
</html>
